# ============================================================================
# Interval - Auto refresh display widgets
# ============================================================================
interval:
  - interval: 10s
    then:
      - lvgl.label.update:
          id: w_mm8learfkl1p2
          text: !lambda |-
            auto now = id(ha_time).now();
            if (!now.is_valid()) return std::string("--:--\n---");
            char buf[32];
            now.strftime(buf, sizeof(buf), "%H:%M\n%a, %b %d");
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_wday0_name
          text: "Today"
      - lvgl.label.update:
          id: lbl_wday1_name
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            ESPTime future = ESPTime::from_epoch_local(t.timestamp + 86400);
            char buf[16];
            future.strftime(buf, sizeof(buf), "%a");
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_wday2_name
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            ESPTime future = ESPTime::from_epoch_local(t.timestamp + (2 * 86400));
            char buf[16];
            future.strftime(buf, sizeof(buf), "%a");
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_wday3_name
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            ESPTime future = ESPTime::from_epoch_local(t.timestamp + (3 * 86400));
            char buf[16];
            future.strftime(buf, sizeof(buf), "%a");
            return std::string(buf);
      - lvgl.label.update:
          id: lbl_wday4_name
          text: !lambda |-
            auto t = id(ha_time).now();
            if (!t.is_valid()) return std::string("---");
            ESPTime future = ESPTime::from_epoch_local(t.timestamp + (4 * 86400));
            char buf[16];
            future.strftime(buf, sizeof(buf), "%a");
            return std::string(buf);

# ============================================================================
# LVGL Fonts
# ============================================================================

spi:
  - id: spi_bus
    clk_pin: 12
    mosi_pin: 11

display:
  - platform: ili9xxx
    id: s3_box_lcd
    model: ${displaymodel}
    invert_colors: ${invertcolors}
    data_rate: 20MHz
    cs_pin: 10
    dc_pin: 46
    update_interval: never
    dimensions:
        height: 320
        width: 240
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: false

image:
  - id: bg_idle
    file: "idle.jpg"
    resize: 240x320
    type: RGB565

lvgl:
  id: my_lvgl
  log_level: WARN
  bg_color: "0x000000"
  displays:
    - s3_box_lcd

  pages:
    - id: page_0
      widgets:
        # Background image
