  # ===== Chat text sensors =====
  - id: text_request
    platform: template
    icon: mdi:ear-hearing
    name: "Request"
    entity_category: diagnostic
    on_value:
      lambda: |-
        std::string req = id(text_request).state.c_str();
        if(req.length() > 0) {
          if(req.length() > 500) {
            std::string truncated = esphome::str_truncate(req.c_str(), 499);
            id(text_request).state = (truncated + "...").c_str();
            req = id(text_request).state.c_str();
          }
          id(chat_msgs).push_back(req);
          id(chat_is_user).push_back(true);
          if(id(chat_msgs).size() > 10) {
            id(chat_msgs).erase(id(chat_msgs).begin());
            id(chat_is_user).erase(id(chat_is_user).begin());
          }
        }
  - id: text_response
    platform: template
    icon: mdi:react
    name: "Response"
    entity_category: diagnostic
    on_value:
      lambda: |-
        std::string res = id(text_response).state.c_str();
        if(res.length() > 0) {
          if(res.length() > 500) {
            std::string truncated = esphome::str_truncate(res.c_str(), 499);
            id(text_response).state = (truncated + "...").c_str();
            res = id(text_response).state.c_str();
          }
          id(chat_msgs).push_back(res);
          id(chat_is_user).push_back(false);
          if(id(chat_msgs).size() > 10) {
            id(chat_msgs).erase(id(chat_msgs).begin());
            id(chat_is_user).erase(id(chat_is_user).begin());
          }
        }

output:
  - platform: ledc
    id: backlight_output
    pin:
      number: 45

light:
  - platform: monochromatic
    id: Sled
    name: Screen
    icon: "mdi:television"
    entity_category: config
    output: backlight_output
    restore_mode: RESTORE_DEFAULT_ON
    default_transition_length: 250ms
  - platform: esp32_rmt_led_strip
    id: led
    name: none
    disabled_by_default: false
    entity_category: config
    pin: GPIO42
    default_transition_length: 0s
    chipset: WS2812
    num_leds: 1
    rgb_order: grb
    effects:
      - pulse:
          name: "Slow Pulse"
          transition_length: 250ms
          update_interval: 250ms
          min_brightness: 50%
          max_brightness: 100%
      - pulse:
          name: "Fast Pulse"
          transition_length: 100ms
          update_interval: 100ms
          min_brightness: 50%
          max_brightness: 100%

i2c:
  - id: bus_a
    sda: 16
    scl: 15
    scan: true

i2s_audio:
  - id: i2s_audio_bus
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO5
    i2s_mclk_pin: GPIO4

audio_dac:
  - platform: es8311
    i2c_id: bus_a
    id: es8311_dac
    bits_per_sample: 16bit
    sample_rate: 48000

microphone:
  - platform: i2s_audio
    id: i2s_mics
    i2s_audio_id: i2s_audio_bus
    adc_type: external
    i2s_din_pin: GPIO6
    channel: left
    pdm: false
    bits_per_sample: 16bit
    sample_rate: 16000

speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    i2s_audio_id: i2s_audio_bus
    dac_type: external
    i2s_dout_pin: GPIO8
    channel: mono
    buffer_duration: 100ms
    sample_rate: 48000
    bits_per_sample: 16bit
    audio_dac: es8311_dac

media_player:
  - platform: speaker
    name: None
    id: external_media_player
    volume_max: 0.9  # don't go higher than 0.8 - ES8311 sẽ bị clipping/rè
    buffer_size: 250000
    announcement_pipeline:
      speaker: i2s_audio_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1 
    files:
      - id: timer_finished_sound
        file: ${end_sound_file}
      - id: wake_word_triggered_sound
        file: ${wake_word_triggered_sound_file}
      - id: end_sound
        file: ${end_sound_file}
    on_play:
      # BẤT KỲ phát nào (TTS, nhạc từ HA, v.v.) → bật PA TRƯỚC khi speaker start
      - script.execute: audio_mode_reply

    on_announcement:
      # Replying/announcing: tắt mic + tắt wakeword + bật loa
      - script.execute: audio_mode_reply
      - if:
          condition:
            - switch.is_on: use_listen_light
          then:
            - light.turn_on:
                id: led
                blue: 100%
                red: 0%
                green: 0%
                brightness: 100%
                effect: none
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:

    on_idle:
      - script.execute: reset_led
      # Idle: CHỈ tắt PA nếu speaker thực sự không phát
      # QUAN TRỌNG: Đảm bảo speaker đã thực sự dừng (không phải chỉ state change)
      - wait_until:
          condition:
            - not:
                speaker.is_playing:
          timeout: 100ms
      # CHỈ tắt PA nếu không có audio đang phát (để phát nhạc từ HA ở idle vẫn được)
      - if:
          condition:
            - not:
                speaker.is_playing:
            - not:
                media_player.is_playing:
          then:
            - script.execute: audio_mode_listen
      - if:
          condition:
            not:
              voice_assistant.is_running:
          then:
            - script.execute: start_wake_word
            - script.execute: set_idle_or_mute_phase

micro_wake_word:
  id: mww
  models:
    - okay_nabu
    - hey_jarvis
    - alexa
  on_wake_word_detected:
    - lambda: id(wake_word_just_triggered) = true;
    - if:
        condition:
          switch.is_on: wake_sound
        then:
          - script.execute:
              id: play_sound
              priority: true
              sound_file: !lambda return id(wake_word_triggered_sound);
          - delay: 300ms
    - voice_assistant.start:
        wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone: i2s_mics
  media_player: external_media_player
  micro_wake_word: mww
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_listening:
    # Listening: tắt loa (PA off) + bật mic + bật wakeword (nếu cần)
    - script.execute: audio_mode_listen
    # IMPORTANT: Không play beep ở đây vì lúc này microphone đã capture (I2S đang bận),
    # sẽ gây lỗi "Parent I2S bus not free" khi speaker cố start.
    # Beep đã được phát trong `micro_wake_word.on_wake_word_detected` (trước khi start VA).
    - lambda: id(wake_word_just_triggered) = false;  # Reset flag
    - if:
        condition:
          - switch.is_on: use_listen_light
        then:
          - light.turn_on:
              id: led
              blue: 100%
              red: 0%
              green: 0%
              effect: "Slow Pulse"
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_phase_id};
    - text_sensor.template.publish:
        id: text_request
        state: ""
    - text_sensor.template.publish:
        id: text_response
        state: ""
    - script.execute: draw_display
  on_stt_vad_end:
    - if:
        condition:
          - switch.is_on: use_listen_light
        then:
          - light.turn_on:
              id: led
              blue: 100%
              red: 0%
              green: 0%
              effect: "Fast Pulse"
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: draw_display
  on_stt_end:
    - text_sensor.template.publish:
        id: text_request
        state: !lambda return x;
    - script.execute: draw_display
  on_tts_start:
    # Replying: tắt mic + tắt wakeword + bật loa
    - script.execute: audio_mode_reply
    - if:
        condition:
          - switch.is_on: use_listen_light
        then:
          - light.turn_on:
              id: led
              blue: 100%
              red: 0%
              green: 0%
              brightness: 100%
              effect: none
    - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
    - text_sensor.template.publish:
        id: text_response
        state: !lambda return x;
    - script.execute: draw_display

  on_end:
    # - microphone.unmute:
    - lambda: id(wake_word_just_triggered) = false;
    - wait_until:
        condition:
          - media_player.is_announcing
        timeout: 0.5s
    - wait_until:
        - and:
            - not:
                media_player.is_announcing
            - not:
                speaker.is_playing
    - if:
        condition:
          switch.is_on: stop_continue_conversation
        then:
          - if:
              condition:
                voice_assistant.is_running
              then:
                - voice_assistant.stop
          - if:
              condition:
                lambda: return id(wake_word_engine_location).current_option() == "On device";
              then:
                - micro_wake_word.start
              else:
                - lambda: id(va).set_use_wake_word(true);
                - voice_assistant.start_continuous:
    - if:
        condition:
          lambda: return id(wake_word_engine_location).current_option() == "On device";
        then:
          - lambda: id(va).set_use_wake_word(false);
          - micro_wake_word.start:
    # Quay về listening (idle): tắt loa + bật mic + bật wakeword
    - script.execute: audio_mode_listen
    - script.execute: reset_led
    - delay: 700ms
    - if:
        condition:
          not:
            voice_assistant.is_running:
        then:
          - script.execute: set_idle_or_mute_phase
          - script.execute: draw_display
          - if:
              condition:
                switch.is_on: sw_end_sound
              then:
                - script.execute:
                    id: play_sound
                    priority: true
                    sound_file: !lambda return id(end_sound);

  on_error:
    - if:
        condition:
          lambda: return !id(init_in_progress);
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - delay: 1s
          - if:
              condition:
                switch.is_off: mute
              then:
                - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
              else:
                - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
    - if:
        condition:
          - switch.is_on: use_listen_light
        then:
          - light.turn_on:
              id: led
              red: 100%
              green: 0%
              blue: 0%
              brightness: 100%
              effect: none
    - delay: 2s
    - script.execute: reset_led
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
  on_client_disconnected:
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
  on_timer_finished:
    - switch.turn_on: timer_ringing
    - if:
        condition:
          - switch.is_on: use_listen_light
        then:
          - light.turn_on:
              id: led
              red: 0%
              green: 100%
              blue: 0%
              brightness: 100%
              effect: "Fast Pulse"
    - wait_until:
        media_player.is_announcing:
    - lambda: id(voice_assistant_phase) = ${voice_assist_timer_finished_phase_id};
    - light.turn_off: led

script:
  # ===== Audio state machine =====
  - id: audio_mode_reply
    then:
      # Replying: chỉ tắt wakeword, PA luôn bật (theo xiaozhi-esphome)
      - micro_wake_word.stop:

  - id: audio_mode_listen
    then:
      # Listening: bật wake word, PA vẫn giữ bật
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - micro_wake_word.start:

  - id: reset_led
    then:
      - if:
          condition:
            - lambda: return id(wake_word_engine_location).current_option() == "On device";
            - switch.is_on: use_listen_light
          then:
            - light.turn_on:
                id: led
                red: 100%
                green: 89%
                blue: 71%
                brightness: 30%
                effect: none
          else:
            - if:
                condition:
                  - lambda: return id(wake_word_engine_location).current_option() != "On device";
                  - switch.is_on: use_listen_light
                then:
                  - light.turn_on:
                      id: led
                      red: 0%
                      green: 100%
                      blue: 100%
                      brightness: 30%
                      effect: none
                else:
                  - light.turn_off: led
  - id: draw_display
    then:
      - if:
          condition:
            lambda: |-
              int phase = id(voice_assistant_phase);
              return phase == ${voice_assist_listening_phase_id} ||
                     phase == ${voice_assist_thinking_phase_id} ||
                     phase == ${voice_assist_replying_phase_id};
          then:
            - lvgl.page.show: page_1
            - lambda: |-
                int phase = id(voice_assistant_phase);
                std::string status = "Đang chờ...";
                lv_color_t color = lv_color_hex(0xFFFFFF);
                if (phase == ${voice_assist_listening_phase_id}) {
                  status = "Đang Nghe...";
                  color = lv_color_hex(0x0AC80A);
                } else if (phase == ${voice_assist_thinking_phase_id}) {
                  status = "Đang Xử Lý...";
                  color = lv_color_hex(0x0A0AC8);
                } else if (phase == ${voice_assist_replying_phase_id}) {
                  status = "Đang Trả Lời...";
                  color = lv_color_hex(0x646464);
                }
                lv_label_set_text(id(lbl_chat_status), status.c_str());
                lv_obj_set_style_text_color(id(lbl_chat_status), color, 0);

                // Xóa tất cả children cũ trong container
                lv_obj_t *cont = id(chat_container);
                lv_obj_set_style_pad_row(cont, 4, 0);
                while (lv_obj_get_child_cnt(cont) > 0) {
                  lv_obj_del(lv_obj_get_child(cont, 0));
                }

                if (id(chat_msgs).empty()) {
                  lv_obj_t *lbl = lv_label_create(cont);
                  lv_label_set_text(lbl, "Đang chờ trò chuyện...");
                  lv_obj_set_width(lbl, 228);
                  lv_label_set_long_mode(lbl, LV_LABEL_LONG_WRAP);
                  lv_obj_set_style_text_font(lbl, id(font_chat_content), 0);
                  lv_obj_set_style_text_color(lbl, lv_color_hex(0xAAAAAA), 0);
                } else {
                  for (int i = 0; i < (int)id(chat_msgs).size(); i++) {
                    bool is_user = id(chat_is_user)[i];
                    std::string prefix = is_user ? "User: " : "LLM: ";
                    std::string full_text = prefix + id(chat_msgs)[i];

                    lv_obj_t *lbl = lv_label_create(cont);
                    lv_label_set_text(lbl, full_text.c_str());
                    lv_obj_set_width(lbl, 228);
                    lv_label_set_long_mode(lbl, LV_LABEL_LONG_WRAP);
                    lv_obj_set_style_text_font(lbl, id(font_chat_content), 0);

                    if (is_user) {
                      // User: màu xanh lá
                      lv_obj_set_style_text_color(lbl, lv_color_hex(0x95EC69), 0);
                    } else {
                      // LLM: màu trắng
                      lv_obj_set_style_text_color(lbl, lv_color_hex(0xFFFFFF), 0);
                    }
                  }
                }

                // Scroll xuống cuối cùng
                lv_obj_scroll_to_y(cont, LV_COORD_MAX, LV_ANIM_OFF);
          else:
            - lvgl.page.show: page_0
      - component.update: s3_box_lcd

  - id: start_wake_word
    then:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - micro_wake_word.start:
      - if:
          condition:
            and:
              - not:
                  - voice_assistant.is_running:
              - lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(true);
            - voice_assistant.start_continuous:
  - id: stop_wake_word
    then:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "In Home Assistant";
          then:
            - lambda: id(va).set_use_wake_word(false);
            - voice_assistant.stop:
      - if:
          condition:
            lambda: return id(wake_word_engine_location).current_option() == "On device";
          then:
            - micro_wake_word.stop:
  - id: set_idle_or_mute_phase
    then:
      - if:
          condition:
            switch.is_off: mute
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
          else:
            - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
  - id: play_sound
    parameters:
      priority: bool
      sound_file: "audio::AudioFile*"
    then:
      # Play sound là announcing → đảm bảo đang ở mode reply
      - script.execute: audio_mode_reply
      - lambda: |-
          if (priority) {
            id(external_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_STOP)
              .set_announcement(true)
              .perform();
          }
          if ( (id(external_media_player).state != media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING ) || priority) {
            id(external_media_player)
              ->play_file(sound_file, true, false);
          }
      # Sau khi phát xong, on_idle của media_player sẽ gọi audio_mode_listen

switch:
  - platform: gpio
    name: "Speaker PA Enable"
    icon: "mdi:speaker"
    entity_category: config
    id: pa_enable
    pin: 
      number: GPIO1
      inverted: true
    restore_mode: RESTORE_DEFAULT_ON
    
  - platform: template
    name: Use listen light
    id: use_listen_light
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    entity_category: config
    on_turn_on:
      - script.execute: reset_led
    on_turn_off:
      - script.execute: reset_led
  - platform: template
    name: Mute
    id: mute
    icon: "mdi:microphone-off"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    entity_category: config
    on_turn_off:
      - microphone.unmute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    on_turn_on:
      - microphone.mute:
      - lambda: id(voice_assistant_phase) = ${voice_assist_muted_phase_id};
  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      - lambda: |-
              id(external_media_player)
                ->make_call()
                .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_OFF)
                .set_announcement(true)
                .perform();
              id(external_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 0);
      - media_player.stop:
          announcement: true
    on_turn_on:
      - lambda: |-
            id(external_media_player)
              ->make_call()
              .set_command(media_player::MediaPlayerCommand::MEDIA_PLAYER_COMMAND_REPEAT_ONE)
              .set_announcement(true)
              .perform();
            id(external_media_player)->set_playlist_delay_ms(speaker::AudioPipelineType::ANNOUNCEMENT, 1000);
      - media_player.speaker.play_on_device_media_file:
          media_file: timer_finished_sound
          announcement: true
      - delay: 15min
      - switch.turn_off: timer_ringing
  - platform: template
    id: wake_sound
    name: Wake sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    id: sw_end_sound
    name: End sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
  - platform: template
    id: stop_continue_conversation
    name: "Stop Continue Conversation"
    icon: "mdi:restart-alert"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF

  - platform: template
    id: startup_sound_switch
    name: Startup sound
    icon: "mdi:card-text-outline"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: show_text
    name: Show Text
    icon: "mdi:card-text-outline"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

select:
  - platform: template
    entity_category: config
    name: Wake word engine location
    id: wake_word_engine_location
    icon: "mdi:account-voice"
    optimistic: true
    restore_value: true
    options:
      - In Home Assistant
      - On device
    initial_option: On device
    on_value:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - wait_until:
                lambda: return id(voice_assistant_phase) == ${voice_assist_muted_phase_id} || id(voice_assistant_phase) == ${voice_assist_idle_phase_id};
            - if:
                condition:
                  lambda: return x == "In Home Assistant";
                then:
                  - micro_wake_word.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - lambda: id(va).set_use_wake_word(true);
                        - voice_assistant.start_continuous:
            - if:
                condition:
                  lambda: return x == "On device";
                then:
                  - lambda: id(va).set_use_wake_word(false);
                  - voice_assistant.stop
                  - delay: 500ms
                  - if:
                      condition:
                        switch.is_off: mute
                      then:
                        - micro_wake_word.start

