substitutions:
  name: voiceassistantdisplaynice
  friendly_name: ESP32S3 Assistant Display
  displaymodel: "ili9341"
  invertcolors: "true"
  wake_word_triggered_sound_file: start.wav
  end_sound_file: end.flac
  voice_assist_idle_phase_id: "1"
  voice_assist_listening_phase_id: "2"
  voice_assist_thinking_phase_id: "3"
  voice_assist_replying_phase_id: "4"
  voice_assist_not_ready_phase_id: "10"
  voice_assist_error_phase_id: "11"
  voice_assist_muted_phase_id: "12"
  voice_assist_timer_finished_phase_id: "20"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2025.5.0
  name_add_mac_suffix: false
  on_boot:
    priority: 600
    then:
      - light.turn_on: Sled
      - script.execute: draw_display
      - delay: 30s
      - if:
          condition:
            lambda: return id(init_in_progress);
          then:
            - lambda: id(init_in_progress) = false;
            - script.execute: draw_display
            - switch.turn_off: mute

esp32:
  board: esp32-s3-devkitc-1
  flash_size: 16MB
  cpu_frequency: 240MHz
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_ESP32S3_DATA_CACHE_64KB: "y"
      CONFIG_ESP32S3_DATA_CACHE_LINE_64B: "y"

psram:
  mode: octal
  speed: 80MHz


api:
  on_client_connected:
    - lambda: |-
        if (!id(boot_sound_played)) {
          id(boot_sound_played) = true;
          if (id(startup_sound_switch).state) {
            id(play_sound)->execute(true, id(wake_word_triggered_sound));
          }
        }
    - lambda: id(init_in_progress) = false;
    - script.execute: start_wake_word
    - script.execute: set_idle_or_mute_phase
  on_client_disconnected:
    - script.execute: stop_wake_word
    - lambda: id(voice_assistant_phase) = ${voice_assist_not_ready_phase_id};
ota:
  - platform: esphome
    id: ota_esphome

logger:

time:
  - platform: homeassistant
    id: ha_time

http_request:
  verify_ssl: false
  timeout: 20s
  buffer_size_rx: 4096

wifi:
  ssid: Black
  password: 12345678
  output_power: 8.5dB
  ap:
    ssid: "ESP32S3 Assistant"
    password: "11223344"

captive_portal:

button:
  - platform: factory_reset
    id: factory_reset_btn
    internal: true
  - platform: template
    name: "Test Speaker"
    icon: "mdi:volume-high"
    id: test_speaker_btn
    on_press:
      - script.execute:
          id: play_sound
          priority: true
          sound_file: !lambda return id(wake_word_triggered_sound);
      - delay: 1s
      - script.execute:
          id: play_sound
          priority: true
          sound_file: !lambda return id(end_sound);

binary_sensor:
  - platform: gpio
    pin:
      number: 0
      mode: INPUT_PULLUP
      ignore_strapping_warning: true
      inverted: true
    id: left_top_button
    internal: true
    on_multi_click:
      - timing:
          - ON for at least 50ms
          - OFF for at least 50ms
        then:
          - if:
              condition:
                switch.is_on: timer_ringing
              then:
                - switch.turn_off: timer_ringing
              else:
                - if:
                    condition:
                      not:
                        voice_assistant.is_running:
                    then:
                      - voice_assistant.start:                     
                    else:
                      - voice_assistant.stop:                     
      - timing:
          - ON for at least 10s
        then:
          - button.press: factory_reset_btn

sensor:
  # POWER_ADC_CHANNEL = ADC_CHANNEL_8 (GPIO9)
  # Mốc pin : 2150 -> 0%, 2450 -> 100%
  - platform: adc
    pin: GPIO9
    id: battery_adc_raw
    name: "Battery ADC Raw"
    update_interval: 1s
    attenuation: 12db
    raw: true
    entity_category: diagnostic
    filters:
      - sliding_window_moving_average:
          window_size: 10
          send_every: 1

  - platform: template
    id: battery_level
    name: "Battery Level"
    unit_of_measurement: "%"
    device_class: battery
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 10s
    lambda: |-
      const float adc = id(battery_adc_raw).state;
      if (std::isnan(adc)) return NAN;
      const float adc_min = 2150.0f;
      const float adc_max = 2450.0f;

      float pct = (adc - adc_min) * 100.0f / (adc_max - adc_min);
      if (pct < 0.0f) pct = 0.0f;
      if (pct > 100.0f) pct = 100.0f;
      return pct;
    on_value:
      then:
        - lvgl.label.update:
            id: lbl_bat_icon
            text: !lambda |-
              float lvl = x;
              if (lvl >= 95) return "\U000F0079";
              else if (lvl >= 85) return "\U000F0082";
              else if (lvl >= 75) return "\U000F0081";
              else if (lvl >= 65) return "\U000F0080";
              else if (lvl >= 55) return "\U000F007F";
              else if (lvl >= 45) return "\U000F007E";
              else if (lvl >= 35) return "\U000F007D";
              else if (lvl >= 25) return "\U000F007C";
              else if (lvl >= 15) return "\U000F007B";
              else if (lvl >= 5) return "\U000F007A";
              else return "\U000F0083";
        - lvgl.label.update:
            id: lbl_p1_bat_icon
            text: !lambda |-
              float lvl = x;
              if (lvl >= 95) return "\U000F0079";
              else if (lvl >= 85) return "\U000F0082";
              else if (lvl >= 75) return "\U000F0081";
              else if (lvl >= 65) return "\U000F0080";
              else if (lvl >= 55) return "\U000F007F";
              else if (lvl >= 45) return "\U000F007E";
              else if (lvl >= 35) return "\U000F007D";
              else if (lvl >= 25) return "\U000F007C";
              else if (lvl >= 15) return "\U000F007B";
              else if (lvl >= 5) return "\U000F007A";
              else return "\U000F0083";
        - lvgl.label.update:
            id: lbl_bat_text
            text:
              format: "%.0f%%"
              args: ['x']
        - lvgl.label.update:
            id: lbl_p1_bat_text
            text:
              format: "%.0f%%"
              args: ['x']

