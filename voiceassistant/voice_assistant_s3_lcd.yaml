  - id: paused_timer_color
    hex: "3b89e3"

spi:
  - id: spi_bus
    clk_pin: 12
    mosi_pin: 11

display:
  - platform: ili9xxx
    id: s3_box_lcd
    model: ${displaymodel}
    invert_colors: ${invertcolors}
    data_rate: 20MHz
    cs_pin: 3
    dc_pin: 10
    reset_pin: 9
    update_interval: never
    dimensions:
        height: 240
        width: 240
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false

    pages:
      - id: idle_page
        lambda: |-
          it.fill(id(idle_color));
          it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_idle), ImageAlign::CENTER);
          id(draw_timer_timeline).execute();
          id(draw_active_timer_widget).execute();
      - id: listening_page
        lambda: |-
          if (id(show_text).state) {
            it.fill(Color(237, 237, 237));
            
            struct WrapResult { std::vector<std::string> lines; int width; int height; int line_height; };
            auto wrap_text = [&](const std::string& text, esphome::font::Font* f, int max_w) -> WrapResult {
                WrapResult res; res.width = 0; res.height = 0; res.line_height = 20;
                if (text.empty()) return res;
                int x1, y1, w, h;
                it.get_text_bounds(0, 0, "A", f, TextAlign::TOP_LEFT, &x1, &y1, &w, &h);
                res.line_height = h > 0 ? (h + 4) : 20;
                std::string word, line;
                for (size_t i = 0; i < text.length(); ++i) {
                    bool is_space = (text[i] == ' ');
                    word += text[i];
                    if (is_space || i == text.length() - 1) {
                        if (word.empty()) continue;
                        std::string test_line = line + word;
                        it.get_text_bounds(0, 0, test_line.c_str(), f, TextAlign::TOP_LEFT, &x1, &y1, &w, &h);
                        if (w > max_w && !line.empty()) {
                            res.lines.push_back(line);
                            it.get_text_bounds(0, 0, line.c_str(), f, TextAlign::TOP_LEFT, &x1, &y1, &w, &h);
                            if (w > res.width) res.width = w;
                            line = (word.length() > 0 && word[0] == ' ') ? word.substr(1) : word;
                        } else { line = test_line; }
                        word.clear();
                    }
                }
                if (!line.empty()) {
                    res.lines.push_back(line);
                    it.get_text_bounds(0, 0, line.c_str(), f, TextAlign::TOP_LEFT, &x1, &y1, &w, &h);
                    if (w > res.width) res.width = w;
                }
                res.height = res.lines.size() * res.line_height; return res;
            };

            int current_y = 240; 
            for (int i = id(chat_msgs).size() - 1; i >= 0; --i) {
                std::string text = id(chat_msgs)[i];
                bool is_user = id(chat_is_user)[i];
                esphome::font::Font* f = is_user ? id(font_request) : id(font_response);
                
                WrapResult wrap = wrap_text(text, f, 200);
                int bubble_w = wrap.width + 16;
                int bubble_h = wrap.height + 16;
                
                current_y -= (bubble_h + 10); 
                if (current_y + bubble_h < 24) break; 
                
                int bubble_y = current_y; 
                int bubble_x = is_user ? (240 - bubble_w - 10) : 10;
                Color bg_color = is_user ? Color(149, 236, 105) : Color::WHITE;
                
                it.filled_rectangle(bubble_x, bubble_y, bubble_w, bubble_h, bg_color);
                for (size_t j = 0; j < wrap.lines.size(); ++j) {
                    it.printf(bubble_x + 8, bubble_y + 8 + j * wrap.line_height, f, Color::BLACK, TextAlign::TOP_LEFT, "%s", wrap.lines[j].c_str());
                }
            }

            if (id(chat_msgs).empty()) {
                it.printf(120, 120, id(font_request), Color::BLACK, TextAlign::CENTER, "Đang chờ trò chuyện...");
            }
            
            it.filled_rectangle(0, 0, 240, 24, Color(220, 220, 220));
            it.printf(120, 12, id(font_request), Color(10, 200, 10), TextAlign::CENTER, "Đang Nghe...");
          } else {
             it.fill(id(listening_color));
             it.image((it.get_width() / 2), (it.get_height() / 2), id(casita_listening), ImageAlign::CENTER);
             id(draw_timer_timeline).execute();
          }
      - id: thinking_page
