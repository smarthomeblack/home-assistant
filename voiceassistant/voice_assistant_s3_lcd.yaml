text_sensor:
  - id: text_request
    platform: template
    icon: mdi:ear-hearing
    name: "Request"
    entity_category: diagnostic 
    on_value:
      lambda: |-
        std::string req = id(text_request).state.c_str();
        if(req.length() > 0) {
          if(req.length() > 500) {
            std::string truncated = esphome::str_truncate(req.c_str(), 499);
            id(text_request).state = (truncated + "...").c_str();
            req = id(text_request).state.c_str();
          }
          id(chat_msgs).push_back(req);
          id(chat_is_user).push_back(true);
          if(id(chat_msgs).size() > 10) {
            id(chat_msgs).erase(id(chat_msgs).begin());
            id(chat_is_user).erase(id(chat_is_user).begin());
          }
        }
        std::string request = id(text_request).state.c_str();
        if (request.find("không cần") != std::string::npos ||
            request.find("Không cần") != std::string::npos ||
            request.find("cảm ơn") != std::string::npos ||
            request.find("Cảm ơn") != std::string::npos ||
            request.find("dừng lại") != std::string::npos ||
            request.find("Dừng lại") != std::string::npos ||
            request.find("stop") != std::string::npos ||
            request.find("Stop") != std::string::npos ||
            request.find("Phẩy") != std::string::npos ||
            request.find("phẩy") != std::string::npos) {
          id(va)->request_stop();
        }
  - id: text_response
    platform: template
    icon: mdi:react
    name: "Response"
    entity_category: diagnostic
    on_value:
      lambda: |-
        std::string res = id(text_response).state.c_str();
        if(res.length() > 0) {
          if(res.length() > 500) {
            std::string truncated = esphome::str_truncate(res.c_str(), 499);
            id(text_response).state = (truncated + "...").c_str();
            res = id(text_response).state.c_str();
          }
          id(chat_msgs).push_back(res);
          id(chat_is_user).push_back(false);
          if(id(chat_msgs).size() > 10) {
            id(chat_msgs).erase(id(chat_msgs).begin());
            id(chat_is_user).erase(id(chat_is_user).begin());
          }
        }

